<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slither.io Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --ui-bg: rgba(10, 10, 25, 0.75);
            --ui-border: rgba(255, 255, 255, 0.1);
            --text-glow: 0 0 10px rgba(255, 255, 255, 0.5);
            --primary: #00ffcc;
        }

        * { font-family: 'Silkscreen', 'Courier New', Courier, monospace; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #05050a;
            color: white; user-select: none; touch-action: none;
        }

        canvas { display: block; }

        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 8px; backdrop-filter: blur(4px); pointer-events: auto; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; pointer-events: auto;
        }

        #overlay h1 { font-size: 4rem; margin: 0 0 20px 0; text-shadow: 0 0 20px var(--primary); color: var(--primary); }
        #stats-display { display: none; text-align: center; margin-bottom: 30px; }
        #stats-display p { font-size: 1.5rem; margin: 5px 0; color: #ddd; }

        input[type="text"] {
            padding: 15px 25px; font-size: 1.5rem; border: 2px solid var(--ui-border);
            border-radius: 30px; background: rgba(0,0,0,0.5); color: white;
            text-align: center; outline: none; margin-bottom: 20px; transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .menu-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; justify-content: center; width: 100%; }
        .skin-select { padding: 10px; font-size: 1.2rem; background: rgba(0,0,0,0.5); color: white; border: 2px solid var(--ui-border); border-radius: 10px; outline: none; cursor: pointer; }
        .room-input { padding: 12px; font-size: 1.2rem; border: 2px solid var(--ui-border); border-radius: 10px; background: rgba(0,0,0,0.5); color: white; text-align: center; width: 120px; text-transform: uppercase; }
        
        /* Custom Skin Color Pickers */
        .color-picker {
            -webkit-appearance: none; appearance: none;
            border: 2px solid var(--ui-border); border-radius: 5px;
            width: 35px; height: 35px; padding: 0; background: none; cursor: pointer;
        }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: none; border-radius: 3px; }

        button {
            padding: 15px 40px; font-size: 1.2rem; background: var(--primary); color: #000;
            border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: transform 0.1s, box-shadow 0.1s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 204, 0.6); }
        button:active { transform: scale(0.95); }
        .btn-small { padding: 12px 20px; font-size: 1rem; }

        /* HUD & Leaderboard */
        #hud { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; text-shadow: var(--text-glow); display: none; }
        #hud div { margin-bottom: 5px; }
        #leaderboard { position: absolute; top: 20px; right: 20px; width: 220px; padding: 15px; display: none; }
        #leaderboard h3 { margin: 0 0 10px 0; text-align: center; font-size: 1.1rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        #lb-list { list-style: none; padding: 0; margin: 0; }
        #lb-list li { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
        .lb-player { color: var(--primary); font-weight: bold; }
        .lb-rank { width: 35px; color: #888; }
        .lb-name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-score { font-family: monospace; }

        /* Minimap */
        #minimap-container {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px;
            border-radius: 50%; background: rgba(0, 0, 0, 0.5); border: 2px solid var(--ui-border);
            overflow: hidden; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #minimap { width: 100%; height: 100%; }
        
        /* Mobile warning */
        #mobile-hint { display: none; color: #aaa; margin-top: 10px; font-size: 0.8rem; }
        @media (max-width: 768px) { #mobile-hint { display: block; } }
    </style>
</head>
<body>

    <canvas id="game"></canvas>

    <div id="ui-layer">
        <div id="hud">
            <div id="score-length">Length: 10</div>
            <div id="score-mass">Mass: 100</div>
            <div id="score-rank" style="color: var(--primary); font-weight: bold; margin-top: 10px;">Rank: -</div>
        </div>

        <div id="leaderboard" class="panel">
            <h3>Leaderboard</h3>
            <ul id="lb-list"></ul>
        </div>

        <div id="minimap-container">
            <canvas id="minimap"></canvas>
        </div>
    </div>

    <div id="overlay">
        <h1 id="title">SLITHER</h1>
        <div id="stats-display">
            <p id="final-length">Final Length: 0</p>
            <p id="final-rank">Rank Reached: 0</p>
        </div>
        
        <input type="text" id="player-name" placeholder="Nickname" maxlength="15" autocomplete="off">
        
        <div class="menu-row">
            <select id="skin-select" class="skin-select">
                <option value="random">Random Skin</option>
                <option value="#ff0055">Neon Red</option>
                <option value="#00ffcc">Cyan</option>
                <option value="#00ff33">Slime Green</option>
                <option value="#cc00ff">Purple</option>
                <option value="#ffcc00">Gold</option>
            </select>
        </div>

        <!-- Custom Skin Builder UI (Hidden by default) -->
        <div id="custom-skin-ui" class="menu-row" style="display: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 2px solid var(--ui-border); width: max-content; margin: 0 auto 15px auto;">
            <span style="margin-right: 10px;">Color 1:</span>
            <input type="color" id="custom-c1" value="#ff0055" class="color-picker">
            <span style="margin-left: 15px; margin-right: 10px;">Color 2:</span>
            <input type="color" id="custom-c2" value="#00ffcc" class="color-picker">
        </div>

        <div class="menu-row">
            <button id="play-offline-btn" class="btn-small">Play Offline</button>
            <button id="host-btn" class="btn-small">Host Online</button>
        </div>
        
        <div class="menu-row">
            <input type="text" id="room-code-input" class="room-input" placeholder="CODE" maxlength="4" autocomplete="off">
            <button id="join-btn" class="btn-small">Join Room</button>
        </div>
        
        <p id="menu-msg" style="color: var(--primary); display: none; margin-top: 10px; font-weight: bold;"></p>
        <p id="mobile-hint">Tap and drag to move. Tap with second finger to boost!</p>
    </div>

    <script>
        const GAME = {
            MAP_RADIUS: 4000, BASE_SPEED: 3.5, BOOST_SPEED: 7.5, TURN_SPEED: 0.15,
            BASE_SIZE: 12, SEGMENT_SPACING: 0.45, MIN_BOOST_LENGTH: 12,
            MAX_ORBS: 800, BOT_COUNT: 25
        };

        const COLORS = ['#ff0055', '#00ffcc', '#ffcc00', '#cc00ff', '#00ff33', '#0066ff', '#ff6600', '#ff00cc', '#33ccff', '#ccff00'];
        const BOT_NAMES = ["Shadow", "Viper", "Noodle", "Snakey", "DangerRope", "Snek", "Apex", "Ghost", "Venom", "Titan", "Wormzilla", "Slippy"];

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: false });
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');

        let width, height, snakes = [], orbs = [], player = null, camera = { x: 0, y: 0 };
        let keys = { up: false, down: false, left: false, right: false, space: false };
        let mouseX = 0, mouseY = 0, useMouse = true;
        let state = 'MENU', frameCount = 0, lastTime = 0, secretKeys = "";
        let isMultiplayer = false, roomCode = "", socket = null, syncInterval = null;

        const overlay = document.getElementById('overlay'), nameInput = document.getElementById('player-name');
        const skinSelect = document.getElementById('skin-select'), playOfflineBtn = document.getElementById('play-offline-btn');
        const hostBtn = document.getElementById('host-btn'), joinBtn = document.getElementById('join-btn');
        const roomCodeInput = document.getElementById('room-code-input'), menuMsg = document.getElementById('menu-msg');
        const hud = document.getElementById('hud'), leaderboard = document.getElementById('leaderboard');
        const minimapContainer = document.getElementById('minimap-container'), statsDisplay = document.getElementById('stats-display');
        const customSkinUi = document.getElementById('custom-skin-ui');

        function resize() { 
            width = window.innerWidth; height = window.innerHeight; 
            canvas.width = width; canvas.height = height; 
            minimapCanvas.width = 150; minimapCanvas.height = 150; 
            mouseX = width / 2; mouseY = height / 2;
        }
        window.addEventListener('resize', resize); resize();

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function distSq(x1, y1, x2, y2) { return (x2 - x1)**2 + (y2 - y1)**2; }
        function lerpAngle(a, b, t) { let diff = b - a; while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2; return a + diff * t; }

        class Orb {
            constructor(x, y, sizeType, color) {
                this.x = x; this.y = y; this.color = color || COLORS[Math.floor(Math.random() * COLORS.length)];
                this.type = sizeType;
                if (sizeType === 0) { this.radius = rand(3, 5); this.mass = 2; }
                else if (sizeType === 1) { this.radius = rand(6, 9); this.mass = 5; }
                else if (sizeType === 2) { this.radius = rand(8, 14); this.mass = rand(10, 20); }
                else if (sizeType === 3) { this.radius = 12; this.mass = 30; }
                this.isFleeing = (sizeType === 3);
            }
            update() {
                if (this.isFleeing) {
                    let nearestSq = Infinity, threat = null;
                    for(let s of snakes) {
                        let d = distSq(this.x, this.y, s.head.x, s.head.y);
                        if(d < 40000 && d < nearestSq) { nearestSq = d; threat = s; }
                    }
                    if (threat) {
                        let angle = Math.atan2(this.y - threat.head.y, this.x - threat.head.x);
                        this.x += Math.cos(angle) * 2; this.y += Math.sin(angle) * 2;
                        if(Math.sqrt(distSq(0,0, this.x, this.y)) > GAME.MAP_RADIUS - 50) {
                            let a = Math.atan2(this.y, this.x);
                            this.x = (GAME.MAP_RADIUS - 50) * Math.cos(a); this.y = (GAME.MAP_RADIUS - 50) * Math.sin(a);
                        }
                    }
                }
            }
            draw(ctx) {
                if (this.x < camera.x - 50 || this.x > camera.x + width + 50 || this.y < camera.y - 50 || this.y > camera.y + height + 50) return;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, this.color); grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad; ctx.fill();
            }
        }

        class Snake {
            constructor(x, y, isPlayer, name, skin = 'random') {
                this.isPlayer = isPlayer; this.name = name; this.skin = skin;
                this.mass = 100; this.targetLength = 10; this.segments = [];
                
                // Set fallback color just in case
                this.color = (this.skin === 'random') ? COLORS[Math.floor(Math.random() * COLORS.length)] : 
                             (this.skin.startsWith('custom') ? '#ffffff' : this.skin);
                             
                this.angle = rand(0, Math.PI * 2); this.targetAngle = this.angle;
                this.speed = GAME.BASE_SPEED; this.isBoosting = false; this.alive = true;
                this.radius = GAME.BASE_SIZE; this.isRemote = false; this.netId = null; this.netTarget = null;
                this.botState = 'WANDER'; this.botTarget = null; this.botTimer = 0; this.turnNoise = rand(-0.5, 0.5);
                for (let i = 0; i < this.targetLength; i++) this.segments.push({ x: x, y: y });
                this.head = this.segments[0];
            }
            get length() { return this.segments.length; }
            
            update() {
                if (!this.alive) return;
                this.targetLength = Math.floor(this.mass / 15) + 10;
                let safeMass = Math.max(50, this.mass); 
                this.radius = GAME.BASE_SIZE + Math.log10(safeMass / 50) * 3;

                if (this.isPlayer) {
                    let dx = 0, dy = 0;
                    if (keys.up) dy -= 1; if (keys.down) dy += 1;
                    if (keys.left) dx -= 1; if (keys.right) dx += 1;
                    if (dx !== 0 || dy !== 0) { this.targetAngle = Math.atan2(dy, dx); useMouse = false; } 
                    else if (useMouse) { this.targetAngle = Math.atan2(mouseY - height / 2, mouseX - width / 2); }
                    this.isBoosting = (keys.space && this.length > GAME.MIN_BOOST_LENGTH);
                } else if (this.isRemote && this.netTarget) {
                    this.targetAngle = this.netTarget.angle; this.mass = this.netTarget.mass;
                    this.head.x += (this.netTarget.x - this.head.x) * 0.2; this.head.y += (this.netTarget.y - this.head.y) * 0.2;
                    this.isBoosting = this.netTarget.isBoosting || false;
                } else if (!this.isRemote) {
                    this.updateBotAI();
                }

                this.angle = lerpAngle(this.angle, this.targetAngle, GAME.TURN_SPEED);
                if (this.isBoosting) {
                    this.speed = GAME.BOOST_SPEED;
                    if (frameCount % 6 === 0) {
                        this.mass = Math.max(10, this.mass - 3);
                        let dropSegment = this.segments[this.segments.length - 1];
                        orbs.push(new Orb(dropSegment.x, dropSegment.y, 0, this.color));
                    }
                    if (this.mass < (GAME.MIN_BOOST_LENGTH - 10) * 15) this.isBoosting = false;
                } else {
                    this.speed = GAME.BASE_SPEED;
                }

                let vx = Math.cos(this.angle) * this.speed, vy = Math.sin(this.angle) * this.speed;
                this.head.x += vx; this.head.y += vy;

                if (Math.sqrt(distSq(0, 0, this.head.x, this.head.y)) > GAME.MAP_RADIUS - this.radius) { this.die(); return; }

                let targetSpacing = this.radius * GAME.SEGMENT_SPACING;
                while (this.segments.length < this.targetLength) this.segments.push({ x: this.segments[this.segments.length - 1].x, y: this.segments[this.segments.length - 1].y });
                while (this.segments.length > this.targetLength) this.segments.pop();

                for (let i = 1; i < this.segments.length; i++) {
                    let curr = this.segments[i], prev = this.segments[i - 1];
                    let dx = prev.x - curr.x, dy = prev.y - curr.y, d = Math.hypot(dx, dy);
                    if (d > targetSpacing) { let ratio = (d - targetSpacing) / d; curr.x += dx * ratio; curr.y += dy * ratio; }
                }
            }

            updateBotAI() {
                this.botTimer--;
                if (Math.sqrt(distSq(0, 0, this.head.x, this.head.y)) > GAME.MAP_RADIUS - 400) { this.targetAngle = Math.atan2(-this.head.y, -this.head.x) + this.turnNoise; this.isBoosting = false; return; }
                if (this.botTimer <= 0) {
                    this.botTimer = Math.floor(rand(20, 60)); this.turnNoise = rand(-0.3, 0.3);
                    let nearestFood = null, nearestFoodDist = Infinity;
                    for (let o of orbs) { let d = distSq(this.head.x, this.head.y, o.x, o.y); if (d < 90000 && d < nearestFoodDist) { nearestFoodDist = d; nearestFood = o; } }
                    if (nearestFood) { this.botState = 'WANDER'; this.botTarget = nearestFood; } else { this.botState = 'WANDER'; this.botTarget = null; }
                }
                if (this.botState === 'WANDER') {
                    this.isBoosting = false;
                    if (this.botTarget && this.botTarget.x) this.targetAngle = Math.atan2(this.botTarget.y - this.head.y, this.botTarget.x - this.head.x);
                    else this.targetAngle += this.turnNoise * 0.1;
                }
            }

            draw(ctx) {
                if (this.head.x < camera.x - 500 || this.head.x > camera.x + width + 500 || this.head.y < camera.y - 500 || this.head.y > camera.y + height + 500) return;
                
                let isGhost = this.skin === 'ghost';
                ctx.strokeStyle = isGhost ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;

                // Draw Body Segments
                for (let i = this.segments.length - 1; i >= 0; i--) {
                    let seg = this.segments[i];
                    if (seg.x < camera.x - this.radius || seg.x > camera.x + width + this.radius || seg.y < camera.y - this.radius || seg.y > camera.y + height + this.radius) continue;
                    
                    ctx.beginPath();
                    let scale = 1 - (i / this.segments.length) * 0.3; 
                    ctx.arc(seg.x, seg.y, this.radius * scale, 0, Math.PI * 2);
                    
                    // Secret Skin Segment Styling
                    if (this.skin === 'rainbow') { ctx.fillStyle = `hsl(${(frameCount * 3 + i * 5) % 360}, 100%, 50%)`; }
                    else if (this.skin === 'zebra') { ctx.fillStyle = (i % 2 === 0) ? '#ffffff' : '#000000'; }
                    else if (this.skin === 'fire') { const fire = ['#ff0000', '#ff5500', '#ffcc00']; ctx.fillStyle = fire[(i + Math.floor(frameCount/5)) % 3]; }
                    else if (isGhost) { ctx.fillStyle = 'rgba(255, 255, 255, 0.25)'; }
                    else if (this.skin && this.skin.startsWith('custom|')) {
                        let parts = this.skin.split('|'); ctx.fillStyle = (i % 2 === 0) ? parts[1] : parts[2];
                    } 
                    else { ctx.fillStyle = this.color; }
                    
                    ctx.fill(); ctx.stroke();
                }

                // Draw Head
                ctx.beginPath(); ctx.arc(this.head.x, this.head.y, this.radius * 1.05, 0, Math.PI * 2);
                
                // Secret Skin Head Styling
                if (this.skin === 'rainbow') { ctx.fillStyle = `hsl(${(frameCount * 3) % 360}, 100%, 50%)`; }
                else if (this.skin === 'zebra') { ctx.fillStyle = '#ffffff'; }
                else if (this.skin === 'fire') { ctx.fillStyle = '#ffcc00'; }
                else if (isGhost) { ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; }
                else if (this.skin && this.skin.startsWith('custom|')) { ctx.fillStyle = this.skin.split('|')[1]; }
                else { ctx.fillStyle = this.color; }
                
                ctx.fill(); ctx.stroke();

                // Draw Eyes
                let eyeOffset = this.radius * 0.5, eyeAngle = Math.PI * 0.25;
                ctx.fillStyle = isGhost ? 'rgba(255,255,255,0.6)' : '#fff';
                let lx = this.head.x + Math.cos(this.angle - eyeAngle) * eyeOffset, ly = this.head.y + Math.sin(this.angle - eyeAngle) * eyeOffset;
                ctx.beginPath(); ctx.arc(lx, ly, this.radius * 0.3, 0, Math.PI*2); ctx.fill();
                let rx = this.head.x + Math.cos(this.angle + eyeAngle) * eyeOffset, ry = this.head.y + Math.sin(this.angle + eyeAngle) * eyeOffset;
                ctx.beginPath(); ctx.arc(rx, ry, this.radius * 0.3, 0, Math.PI*2); ctx.fill();

                // Draw Pupils
                ctx.fillStyle = isGhost ? 'rgba(0,0,0,0.5)' : '#000';
                let px = Math.cos(this.angle) * (this.radius * 0.1), py = Math.sin(this.angle) * (this.radius * 0.1);
                ctx.beginPath(); ctx.arc(lx + px, ly + py, this.radius * 0.15, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(rx + px, ry + py, this.radius * 0.15, 0, Math.PI*2); ctx.fill();

                if (this.name) {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '14px "Silkscreen", Arial'; ctx.textAlign = 'center';
                    ctx.fillText(this.name, this.head.x, this.head.y - this.radius - 10);
                }
            }

            die() {
                this.alive = false;
                let drops = Math.max(1, Math.min(this.mass / 5, 100));
                let massPerDrop = Math.max(1, this.mass / drops);
                let dropType = massPerDrop > 15 ? 2 : 1;
                
                // Use a default color for drops if using a secret skin
                let dropColor = this.color;
                if (this.skin === 'rainbow') dropColor = '#ff00cc';
                else if (this.skin === 'zebra') dropColor = '#ffffff';
                else if (this.skin === 'fire') dropColor = '#ff5500';
                else if (this.skin === 'ghost') dropColor = '#aaaaaa';
                else if (this.skin && this.skin.startsWith('custom|')) dropColor = this.skin.split('|')[1];
                
                for (let i = 0; i < this.segments.length; i += 2) {
                    if(Math.random() > 0.3) continue;
                    orbs.push(new Orb(this.segments[i].x + rand(-20, 20), this.segments[i].y + rand(-20, 20), dropType, dropColor));
                }
                
                if (this.isPlayer) {
                    showDeathScreen();
                    if (isMultiplayer && socket) socket.emit('playerDied');
                } else if (!isMultiplayer && !this.isRemote) {
                    setTimeout(() => { if (state === 'PLAYING') spawnBot(); }, rand(2000, 5000));
                }
            }
        }

        // --- Core Logic ---
        function spawnOrb(type) {
            let angle = rand(0, Math.PI * 2), distToCenter = rand(0, GAME.MAP_RADIUS - 50);
            orbs.push(new Orb(Math.cos(angle) * distToCenter, Math.sin(angle) * distToCenter, type));
        }

        function spawnBot() {
            let angle = rand(0, Math.PI * 2), distToCenter = rand(0, GAME.MAP_RADIUS - 200);
            let bot = new Snake(Math.cos(angle) * distToCenter, Math.sin(angle) * distToCenter, false, BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)], 'random');
            bot.mass = rand(100, 500); snakes.push(bot);
        }

        function showMsg(msg, color = 'var(--primary)') { menuMsg.style.color = color; menuMsg.innerText = msg; menuMsg.style.display = 'block'; }

        function setupNetwork() {
            if (socket) socket.disconnect();
            socket = io(window.location.origin); 

            socket.on('connect_error', (err) => { showMsg("Failed to connect to multiplayer server.", "red"); console.error(err); });

            socket.emit('joinRoom', {
                roomCode: roomCode,
                playerState: { name: player.name, skin: player.skin, x: player.head.x, y: player.head.y, angle: player.angle, mass: player.mass, isBoosting: player.isBoosting }
            });

            socket.on('roomState', (data) => { for (let id in data.players) { if (id !== socket.id) addOrUpdateRemotePlayer(id, data.players[id]); } });
            socket.on('playerJoined', (data) => addOrUpdateRemotePlayer(data.id, data));
            socket.on('playerMoved', (data) => addOrUpdateRemotePlayer(data.id, data));
            socket.on('playerLeft', (id) => removeRemotePlayer(id));
            socket.on('playerDied', (id) => removeRemotePlayer(id));

            syncInterval = setInterval(() => {
                if (player && player.alive) {
                    socket.emit('updatePosition', { x: player.head.x, y: player.head.y, angle: player.angle, mass: player.mass, isBoosting: player.isBoosting });
                }
            }, 100);
        }

        function addOrUpdateRemotePlayer(id, data) {
            let existing = snakes.find(s => s.netId === id);
            if (existing) { existing.netTarget = data; if (data.name) existing.name = data.name; } 
            else {
                let newSnake = new Snake(data.x, data.y, false, data.name || "Player", data.skin);
                newSnake.netId = id; newSnake.isRemote = true; newSnake.mass = data.mass; snakes.push(newSnake);
            }
        }

        function removeRemotePlayer(id) { let existing = snakes.find(s => s.netId === id); if (existing && existing.alive) existing.die(); }

        function initGameEnvironment() {
            snakes = []; orbs = []; frameCount = 0;
            if (syncInterval) clearInterval(syncInterval);

            document.getElementById('title').innerText = "SLITHER";
            statsDisplay.style.display = 'none';

            // Resolve selected skin
            let chosenSkin = skinSelect.value;
            if (chosenSkin === 'custom') {
                chosenSkin = `custom|${document.getElementById('custom-c1').value}|${document.getElementById('custom-c2').value}`;
            }

            player = new Snake(0, 0, true, nameInput.value.trim() || "Player", chosenSkin);
            snakes.push(player);

            for (let i = 0; i < GAME.MAX_ORBS / 2; i++) spawnOrb(0);
            for(let i=0; i < 5; i++) spawnOrb(3);

            overlay.style.display = 'none'; menuMsg.style.display = 'none'; customSkinUi.style.display = 'none';
            hud.style.display = 'block'; leaderboard.style.display = 'block'; minimapContainer.style.display = 'block';

            state = 'PLAYING'; lastTime = performance.now();
            canvas.focus(); requestAnimationFrame(gameLoop);
        }

        playOfflineBtn.addEventListener('click', () => {
            isMultiplayer = false; initGameEnvironment();
            for (let i = 0; i < GAME.BOT_COUNT; i++) spawnBot();
        });

        hostBtn.addEventListener('click', () => {
            isMultiplayer = true; roomCode = ""; const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<4; i++) roomCode += chars.charAt(Math.floor(Math.random() * chars.length));
            initGameEnvironment(); setupNetwork();
        });

        joinBtn.addEventListener('click', () => {
            const code = roomCodeInput.value.toUpperCase();
            if(code.length !== 4) { showMsg("Please enter a 4-letter code.", "red"); return; }
            isMultiplayer = true; roomCode = code; initGameEnvironment(); setupNetwork();
        });

        // Toggle custom color picker UI based on selection
        skinSelect.addEventListener('change', (e) => {
            if (e.target.value === 'custom') { customSkinUi.style.display = 'flex'; } 
            else { customSkinUi.style.display = 'none'; }
        });

        function showDeathScreen() {
            state = 'DEAD';
            document.getElementById('title').innerText = "YOU DIED!";
            document.getElementById('final-length').innerText = `Final Length: ${player.length}`;
            snakes.sort((a, b) => b.mass - a.mass);
            document.getElementById('final-rank').innerText = `Rank Reached: ${snakes.indexOf(player) + 1} of ${snakes.length}`;
            statsDisplay.style.display = 'block'; overlay.style.display = 'flex';
            hud.style.display = 'none'; leaderboard.style.display = 'none'; minimapContainer.style.display = 'none';
            
            // Re-show custom skin UI if it was selected
            if (skinSelect.value === 'custom') customSkinUi.style.display = 'flex';
        }

        function checkCollisions() {
            for (let i = orbs.length - 1; i >= 0; i--) {
                let o = orbs[i];
                for (let s of snakes) {
                    if (!s.alive) continue;
                    if (distSq(s.head.x, s.head.y, o.x, o.y) < (s.radius + o.radius + 5)**2) {
                        s.mass += o.mass; orbs.splice(i, 1); break;
                    }
                }
            }
            for (let s1 of snakes) {
                if (!s1.alive) continue;
                for (let s2 of snakes) {
                    if (s1 === s2 || !s2.alive || (s1.isRemote && s2.isRemote)) continue;
                    if (Math.abs(s1.head.x - s2.head.x) > s2.targetLength * 15 + 100 || Math.abs(s1.head.y - s2.head.y) > s2.targetLength * 15 + 100) continue;
                    let hit = false;
                    for (let i = 0; i < s2.segments.length; i+=2) {
                        if (distSq(s1.head.x, s1.head.y, s2.segments[i].x, s2.segments[i].y) < (s1.radius * 0.8 + s2.radius * 0.8)**2) {
                            if (i === 0) {
                                if (s1.mass > s2.mass) { s2.die(); } else if (s2.mass > s1.mass) { s1.die(); hit = true; } else { s1.die(); s2.die(); hit = true; }
                            } else { s1.die(); hit = true; }
                            break;
                        }
                    }
                    if (hit) break;
                }
            }
        }

        function updateUI() {
            if (!player || !player.alive) return;
            document.getElementById('score-length').innerText = `Length: ${player.length}`;
            document.getElementById('score-mass').innerText = `Mass: ${Math.floor(player.mass)}`;

            if (frameCount % 30 === 0) {
                snakes.sort((a, b) => b.mass - a.mass);
                let html = '', pRank = -1;
                for (let i = 0; i < Math.min(10, snakes.length); i++) {
                    let s = snakes[i]; if (!s.alive) continue;
                    let isP = s === player; if (isP) pRank = i + 1;
                    html += `<li class="${isP ? 'lb-player' : ''}"><span class="lb-rank">#${i+1}</span><span class="lb-name">${s.name}</span><span class="lb-score">${s.length}</span></li>`;
                }
                document.getElementById('lb-list').innerHTML = html;
                if (pRank === -1) pRank = snakes.indexOf(player) + 1;
                document.getElementById('score-rank').innerText = isMultiplayer ? `Room: ${roomCode} | Rank: #${pRank} of ${snakes.length}` : `Rank: #${pRank} of ${snakes.length}`;
            }

            minimapCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            minimapCtx.fillStyle = 'rgba(20,20,40,0.8)'; minimapCtx.beginPath(); minimapCtx.arc(75, 75, 75, 0, Math.PI*2); minimapCtx.fill();
            minimapCtx.strokeStyle = 'rgba(255,255,255,0.2)'; minimapCtx.stroke();
            let scale = 75 / GAME.MAP_RADIUS;
            for (let s of snakes) {
                if (!s.alive) continue;
                minimapCtx.fillStyle = s === player ? '#fff' : (s.skin.startsWith('custom|') ? s.skin.split('|')[1] : s.color); 
                minimapCtx.beginPath();
                minimapCtx.arc(75 + s.head.x * scale, 75 + s.head.y * scale, s === player ? 3 : 1.5, 0, Math.PI*2); minimapCtx.fill();
            }
        }

        function drawBackground() {
            ctx.fillStyle = '#05050a'; ctx.fillRect(0, 0, width, height);
            ctx.save(); ctx.translate(-camera.x, -camera.y);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            let spacing = 100, startX = Math.floor(camera.x / spacing) * spacing, startY = Math.floor(camera.y / spacing) * spacing;
            for (let x = startX; x < camera.x + width; x += spacing) {
                for (let y = startY; y < camera.y + height; y += spacing) {
                    if (distSq(x, y, 0, 0) < GAME.MAP_RADIUS**2) { ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill(); }
                }
            }
            ctx.beginPath(); ctx.arc(0, 0, GAME.MAP_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 0, 50, 0.3)'; ctx.lineWidth = 10; ctx.stroke();
            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (state !== 'PLAYING') return;
            let dt = timestamp - lastTime; lastTime = timestamp; frameCount++;

            if (frameCount % 10 === 0 && orbs.length < GAME.MAX_ORBS) spawnOrb(Math.random() > 0.95 ? 3 : 0);
            for (let o of orbs) o.update();
            for (let s of snakes) s.update();
            checkCollisions();
            snakes = snakes.filter(s => s.alive);

            if (player && player.alive) { camera.x += (player.head.x - width/2 - camera.x) * 0.1; camera.y += (player.head.y - height/2 - camera.y) * 0.1; }

            drawBackground();
            ctx.save(); ctx.translate(-camera.x, -camera.y);
            for (let o of orbs) o.draw(ctx);
            [...snakes].sort((a,b) => a.mass - b.mass).forEach(s => s.draw(ctx));
            ctx.restore();

            updateUI();
            if (state === 'PLAYING') requestAnimationFrame(gameLoop);
        }

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowUp' || e.key === 'w') keys.up = true;
            if (e.code === 'ArrowDown' || e.key === 's') keys.down = true;
            if (e.code === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.code === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.code === 'Space' || e.key === ' ') keys.space = true;
            
            // Secret Code Listener
            if (e.key && e.key.length === 1 && state === 'MENU') {
                secretKeys += e.key.toLowerCase();
                if (secretKeys.length > 20) secretKeys = secretKeys.substring(secretKeys.length - 20);
                
                if (secretKeys.includes("secretskin")) {
                    if (!document.getElementById('secret-unlocked')) {
                        const createOpt = (val, text, color) => {
                            let opt = document.createElement('option'); opt.value = val; opt.text = text;
                            opt.style.fontWeight = "bold"; opt.style.color = color; return opt;
                        };
                        
                        skinSelect.add(createOpt('rainbow', '🌈 Rainbow', '#ff00cc'));
                        skinSelect.add(createOpt('zebra', '🦓 Zebra', '#ffffff'));
                        skinSelect.add(createOpt('fire', '🔥 Fire Animated', '#ff5500'));
                        skinSelect.add(createOpt('ghost', '👻 Transparent Ghost', '#aaaaaa'));
                        skinSelect.add(createOpt('custom', '🎨 Custom Colors...', '#00ffcc'));
                        
                        let marker = document.createElement('option'); marker.id = 'secret-unlocked'; marker.style.display = 'none';
                        skinSelect.add(marker);

                        skinSelect.value = "rainbow";
                        showMsg("SECRET SKINS UNLOCKED!", "#ff00cc");
                    }
                    secretKeys = "";
                }
            }
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowUp' || e.key === 'w') keys.up = false;
            if (e.code === 'ArrowDown' || e.key === 's') keys.down = false;
            if (e.code === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.code === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.code === 'Space' || e.key === ' ') keys.space = false;
        });

        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; useMouse = true; });
        window.addEventListener('mousedown', e => { if (state === 'PLAYING') keys.space = true; });
        window.addEventListener('mouseup', e => { keys.space = false; });
        
        window.addEventListener('touchstart', e => {
            if (state !== 'PLAYING') return;
            mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; useMouse = true;
            if (e.touches.length > 1) keys.space = true; 
        }, {passive: false});
        window.addEventListener('touchmove', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, {passive: false});
        window.addEventListener('touchend', e => { if (e.touches.length < 2) keys.space = false; });

    </script>
</body>
</html>
